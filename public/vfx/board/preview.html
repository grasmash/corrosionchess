<!doctype html><meta charset="utf8">
<title>board textures</title>
<style>
body{font-family:system-ui;background:#1b1a18;color:#eee;margin:20px}
.tile{width:96px;height:96px;background-size:96px 96px}
.repeat{width:192px;height:192px;background-size:96px 96px}
h2{font-size:14px;margin:20px 0 6px}
.row{display:flex;gap:16px}
</style>
<h1>board tile textures</h1>

<h2>stone-dark (1x1 vs 2x2 tiled)</h2>
<div class="row">
<div class="tile" style="background-image:url('stone-dark.png')"></div>
<div class="repeat" style="background-image:url('stone-dark.png');background-repeat:repeat"></div>
</div>
<h2>stone-light (1x1 vs 2x2 tiled)</h2>
<div class="row">
<div class="tile" style="background-image:url('stone-light.png')"></div>
<div class="repeat" style="background-image:url('stone-light.png');background-repeat:repeat"></div>
</div>
